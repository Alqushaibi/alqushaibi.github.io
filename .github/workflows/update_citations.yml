name: Update Google Scholar Citations

on:
  schedule:
    # Runs every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "scholarly>=1.7,<2" "httpx>=0.24" "requests>=2.28"

      - name: Run citation updater
        run: python scripts/update_citations.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet assets/data/publications.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated citations
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add assets/data/publications.json
          git commit -m "Auto-update: Google Scholar citations [$(date +'%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "Citations are already up to date. No commit needed."
